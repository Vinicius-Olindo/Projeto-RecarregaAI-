# RecarregaAi! 2.3.7

name: Publicar site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "extension/public/**"
      - "extension/css/**"
      - "extension/js/privacy.js"
      - "extension/js/uninstall.js"
      - "extension/js/modules/**"
      - "extension/assets/icons/**"
      - "scripts/build-site.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publicar GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Validar projeto
        run: npm run check

      - name: Gerar site
        run: npm run build:site

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
